name: Deploy to Cloudflare Pages

# Deploy on push to main. Sandy's CMS saves AND Atlas-merged edits both deploy
# automatically — there is no deploy-time approval. The compliance scan below still
# runs on EVERY deploy, so non-compliant content (a disease/income claim) fails the
# deploy and never goes live, with no human needed. Carson's approval lives upstream
# and ONLY on the Atlas "client requested a fix" path (approved in Atlas before merge);
# Sandy's own edits publish freely.

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # lets you trigger a deploy by hand from the Actions tab

permissions:
  contents: read

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build

      # Defense-in-depth: run the compliance scan on the ACTUAL artifact about to
      # deploy. Branch protection runs it on PRs; this guarantees it also runs on
      # the deploy regardless of how the commit reached main (direct push, admin
      # merge, etc.). If a disease/income claim is present, the deploy FAILS here.
      - name: Compliance scan (gate the deploy)
        run: node scripts/compliance-lint.mjs

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: d085ce2c36e9c8a385f3b7772b8681d9
          command: pages deploy dist --project-name=live-well-sandy --branch=main
