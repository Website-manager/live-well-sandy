# Pages CMS configuration — https://pagescms.org/docs/configuration/
# This file lets Sandy edit the website's words from a friendly panel.
# It lives at the repo root and Pages CMS reads it from the default branch.

media:
  input: public/images
  output: /images

content:
  # ---------------------------------------------------------------------
  # SPECIALS — the section Sandy changes each month ("This season").
  # Add, edit, hide, or reorder these and the homepage updates on rebuild.
  # ---------------------------------------------------------------------
  - name: specials
    label: This Season's Picks
    type: collection
    path: src/content/specials
    view:
      fields: [title, label, order, published]
      primary: title
      sort: [order, title]
      default:
        sort: order
        order: asc
    fields:
      - name: product_image
        label: Product photo (optional)
        type: image
        description: A photo to show on the left side of this card. Click to upload an image — one of the free product photos you download works well. Leave it empty to show the leaf illustration instead.
      - name: title
        label: Name of the pick
        type: string
        description: The big headline on the card, e.g. "Steady & Bright".
      - name: label
        label: Little label above the name
        type: string
        description: The small line above the name, e.g. "Blend of the month".
      - name: body
        label: Description
        type: rich-text
        description: A sentence or two about this pick. This is the paragraph on the card.
        options:
          format: markdown
      - name: shop_url
        label: Your doTERRA store link
        type: string
        description: Where the "Shop this" button sends people.
      - name: order
        label: Display order
        type: number
        description: Lower numbers show first (1, 2, 3...).
        default: 1
      - name: published
        label: Show on the website?
        type: boolean
        description: Turn off to hide this pick without deleting it.
        default: true

  # ---------------------------------------------------------------------
  # HOME — the top of the page: greeting, headline, and the three numbers.
  # The store link here is used everywhere on the site.
  # ---------------------------------------------------------------------
  - name: home
    label: Home Page (top of site)
    type: file
    path: src/content/pages/home.md
    fields:
      - name: hero_image
        label: Your photo (top of the page)
        type: image
        description: The picture in the framed card at the top of your site. Click to upload a photo of yourself — a clear, well-lit one works best. Leave it empty to show the leaf illustration instead.
      - name: eyebrow
        label: Small line above the headline
        type: string
        description: The little label at the very top, e.g. "Natural wellness · Oak Ridge, TN".
      - name: title
        label: Big headline
        type: string
        description: The large headline people see first, e.g. "Natural wellness, shared simply."
      - name: intro
        label: Welcome paragraph
        type: text
        description: The short paragraph under the headline.
      - name: cta_label
        label: Button wording
        type: string
        description: The words on the main button, e.g. "Shop with me".
      - name: cta_url
        label: Your doTERRA store link
        type: string
        description: The link used by the buttons in the menu, hero, and footer. Change it in one place here.
      - name: stat_1_value
        label: First number
        type: string
        description: A small number that stands out, e.g. "10".
      - name: stat_1_label
        label: First number — caption
        type: string
        description: What the first number means, e.g. "Children".
      - name: stat_2_value
        label: Second number
        type: string
        description: e.g. "22"
      - name: stat_2_label
        label: Second number — caption
        type: string
        description: What the second number means, e.g. "Grandchildren".
      - name: stat_3_value
        label: Third number
        type: string
        description: e.g. "2×/mo"
      - name: stat_3_label
        label: Third number — caption
        type: string
        description: What the third number means, e.g. "Online classes".
      # --- "Why work with me" — the three reasons shown on the home page ---
      - name: value_1_title
        label: Reason 1 — title
        type: string
        description: The bold title of your first reason, e.g. "Products I personally love".
      - name: value_1_body
        label: Reason 1 — short text
        type: text
        description: A sentence or two explaining the first reason.
      - name: value_2_title
        label: Reason 2 — title
        type: string
        description: The bold title of your second reason, e.g. "A real person to ask".
      - name: value_2_body
        label: Reason 2 — short text
        type: text
        description: A sentence or two explaining the second reason.
      - name: value_3_title
        label: Reason 3 — title
        type: string
        description: The bold title of your third reason, e.g. "Learn right alongside me".
      - name: value_3_body
        label: Reason 3 — short text
        type: text
        description: A sentence or two explaining the third reason.
      # --- Featured product photo in the "Ready to start?" box (Sandy swaps monthly) ---
      - name: featured_image
        label: Featured product photo (bottom of home page)
        type: image
        description: The product photo in the "Ready to start?" box near the bottom of your home page. Click to upload a new one — great for featuring a different product each month.

  # ---------------------------------------------------------------------
  # ABOUT — Sandy's story section.
  # ---------------------------------------------------------------------
  - name: about
    label: About / Your Story
    type: file
    path: src/content/pages/about.md
    fields:
      - name: story_image
        label: Your photo (top of the About page)
        type: image
        description: The framed photo at the very top of your story page. Click to upload a photo of yourself. Leave empty to show the leaf illustration instead.
      - name: story_aside_image
        label: Photo beside your story (you and your mom)
        type: image
        description: The smaller photo further down, next to your story — right now it's you and your mom at the beach. Click to upload a different photo.
      - name: eyebrow
        label: Small line above the quote
        type: string
        description: The little label at the top of the About page, e.g. "The person behind Live Well".
      - name: quote
        label: Big quote
        type: text
        description: The large italic quote at the top of your story.
      - name: body
        label: Your story
        type: rich-text
        description: The paragraphs about you. Write as much as you like.
        options:
          format: markdown
      - name: sign_name
        label: Your name (signature)
        type: string
        description: Shown at the end of the story, e.g. "Sandy".
      - name: sign_role
        label: Your title / location
        type: string
        description: Under your name, e.g. "Wellness guide · Oak Ridge, Tennessee".
      # --- "What matters to me" — the three values shown on the About page ---
      - name: about_value_1_title
        label: Value 1 — title
        type: string
        description: The bold title of your first value, e.g. "Simple over complicated".
      - name: about_value_1_body
        label: Value 1 — short text
        type: text
        description: A sentence or two explaining the first value.
      - name: about_value_2_title
        label: Value 2 — title
        type: string
        description: The bold title of your second value, e.g. "Personal, not pushy".
      - name: about_value_2_body
        label: Value 2 — short text
        type: text
        description: A sentence or two explaining the second value.
      - name: about_value_3_title
        label: Value 3 — title
        type: string
        description: The bold title of your third value, e.g. "Community first".
      - name: about_value_3_body
        label: Value 3 — short text
        type: text
        description: A sentence or two explaining the third value.
      - name: classes_body
        label: Classes & workshop note
        type: text
        description: The short note about your online classes and home workshop, near the bottom of the About page.

  # ---------------------------------------------------------------------
  # CONTACT — the Contact page + the details used in the footer.
  # ---------------------------------------------------------------------
  - name: contact
    label: Contact Page & Details
    type: file
    path: src/content/pages/contact.md
    fields:
      - name: contact_heading
        label: Contact page headline
        type: string
        description: The big headline at the top of your Contact page, e.g. "Let's stay in touch".
      - name: contact_intro
        label: Contact page intro
        type: text
        description: The friendly paragraph under the Contact headline.
      - name: location
        label: City and state
        type: string
        description: e.g. "Oak Ridge, Tennessee".
      - name: email
        label: Email address
        type: string
        description: People can click this to email you.
      - name: phone
        label: Phone number (optional)
        type: string
        description: Leave blank if you would rather not show one.
      - name: facebook_label
        label: Facebook link wording
        type: string
        description: The words for your Facebook link, e.g. "Live Well Team on Facebook".
      - name: facebook_url
        label: Facebook link address
        type: string
        description: The web address your Facebook link points to.
